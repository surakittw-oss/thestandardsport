    :root {
      --bg:#ffffff; --bg-alt:#f4f4f4; --bg-card:#ffffff; --bg-row:#fafafa;

      --bdr:#e8e8e8; --bdr-2:#f0f0f0; --accent:#ffa5f7;
    }
    [data-theme="dark"] {
      --bg:#111111; --bg-alt:#181818; --bg-card:#1c1c1c; --bg-row:#202020;
      --txt:#efefef; --txt-2:#cccccc; --txt-3:#777777; --txt-4:#444444;
      --bdr:#2a2a2a; --bdr-2:#242424;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: Sarabun, sans-serif; background: var(--bg); color: var(--txt); -webkit-font-smoothing: antialiased; transition: background .25s, color .25s; }
    button { cursor: pointer; }
    ::-webkit-scrollbar { width: 4px; background: var(--bg-alt); }
    ::-webkit-scrollbar-thumb { background: #ffa5f7; }

    .rsp-wrap  { max-width:1280px; margin:0 auto; padding:0 40px; }
    .rsp-hero  { display:grid; grid-template-columns:1fr 360px; gap:48px; align-items:start; }
    .rsp-lead  { display:grid; grid-template-columns:1.15fr 1fr; gap:40px; align-items:start; }
    .rsp-lead-r{ display:grid; grid-template-columns:1fr 1fr; gap:30px 26px; }
    .rsp-hgrid { display:grid; grid-template-columns:7fr 3fr; gap:20px; }
    .rsp-cal   { display:grid; grid-template-columns:repeat(2,1fr); gap:6px; }
    .rsp-f1two { display:grid; grid-template-columns:1fr 1fr; gap:28px; }
    .rsp-cons  { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .rsp-news  { display:grid; grid-template-columns:repeat(3,1fr); gap:24px; }
    .rsp-ytmn  { display:grid; grid-template-columns:1.55fr 1fr; gap:28px; align-items:start; }
    .rsp-ytbt  { display:grid; grid-template-columns:repeat(3,1fr); gap:24px; margin-top:28px; }
    .rsp-tbl   { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .nav-mob   { display:none; }
    .nav-desk  { display:flex; }

    @media (max-width:1024px) {
      .rsp-wrap  { padding:0 24px; }
      .rsp-hero  { grid-template-columns:1fr 280px; gap:28px; }
      .rsp-lead  { gap:28px; }
      .rsp-ytmn  { grid-template-columns:1.1fr 1fr; }
      .rsp-ytbt  { grid-template-columns:repeat(2,1fr); }
    }
    @media (max-width:768px) {
      .rsp-wrap  { padding:0 16px; }
      .rsp-hero  { grid-template-columns:1fr; }
      .rsp-lead  { grid-template-columns:1fr; gap:32px; }
      .rsp-hgrid { grid-template-columns:1fr; }
      .rsp-cal   { grid-template-columns:1fr; }
      .rsp-f1two { grid-template-columns:1fr; }
      .rsp-cons  { grid-template-columns:1fr; }
      .rsp-news  { grid-template-columns:repeat(2,1fr); }
      .rsp-ytmn  { grid-template-columns:1fr; }
      .rsp-ytbt  { grid-template-columns:repeat(2,1fr); }
      .nav-mob   { display:flex !important; }
      .nav-desk  { display:none !important; }
      .nav-desk.open { display:flex !important; flex-direction:column; position:absolute; top:100%; left:0; right:0;

<script type="text/babel">
const __TW = `.twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:272px;max-height:calc(100vh - 32px);display:flex;flex-direction:column;background:rgba(250,249,247,.88);color:#29261b;-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);border:.5px solid rgba(255,255,255,.6);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.18);font:11.5px/1.4 ui-sans-serif,system-ui,sans-serif;overflow:hidden}
.twk-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 8px 10px 14px;cursor:move;user-select:none}
.twk-hd b{font-size:12px;font-weight:600}.twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.5);width:22px;height:22px;border-radius:6px;cursor:pointer;font-size:13px}
.twk-x:hover{background:rgba(0,0,0,.07)}.twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;min-height:0}
.twk-row{display:flex;flex-direction:column;gap:5px}.twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
.twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.7)}.twk-lbl>span:first-child{font-weight:500}
.twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(41,38,27,.4);padding:10px 0 0}.twk-sect:first-child{padding-top:0}
.twk-field{appearance:none;width:100%;height:26px;padding:0 8px;border:.5px solid rgba(0,0,0,.1);border-radius:7px;background:rgba(255,255,255,.6);color:inherit;font:inherit;outline:none}
select.twk-field{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='rgba(0,0,0,.5)' d='M0 0h10L5 6z'/></svg>");background-repeat:no-repeat;background-position:right 8px center;padding-right:22px}
.twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;background:rgba(0,0,0,.06);user-select:none}
.twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);transition:left .15s,width .15s}
.twk-seg button{position:relative;z-index:1;flex:1;border:0;background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;border-radius:6px;cursor:pointer;padding:4px 6px;line-height:1.2}`;

function useTweaks(d) {
  const [v, sv] = React.useState(d);
  const set = React.useCallback((k, val) => {
    const e = typeof k === 'object' ? k : { [k]: val };
    sv(p => ({ ...p, ...e }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: e }, '*');
  }, []);
  return [v, set];
}
function TweaksPanel({ title='Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  const off = React.useRef({ x: 16, y: 16 });
  React.useEffect(() => {
    const h = e => { if (e?.data?.type === '__activate_edit_mode') setOpen(true); else if (e?.data?.type === '__deactivate_edit_mode') setOpen(false); };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);
  const dismiss = () => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };
  const drag = e => {
    const p = ref.current; if (!p) return;
    const r = p.getBoundingClientRect(), sx = e.clientX, sy = e.clientY;
    const sr = window.innerWidth - r.right, sb = window.innerHeight - r.bottom;
    const mv = ev => { off.current = { x: sr-(ev.clientX-sx), y: sb-(ev.clientY-sy) }; p.style.right = off.current.x+'px'; p.style.bottom = off.current.y+'px'; };
    const up = () => { window.removeEventListener('mousemove', mv); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', mv); window.addEventListener('mouseup', up);
  };
  if (!open) return null;
  return (<><style>{__TW}</style><div ref={ref} className="twk-panel" style={{ right: off.current.x, bottom: off.current.y }}><div className="twk-hd" onMouseDown={drag}><b>{title}</b><button className="twk-x" onMouseDown={e=>e.stopPropagation()} onClick={dismiss}>✕</button></div><div className="twk-body">{children}</div></div></>);
}
function TweakSection({ label }) { return <div className="twk-sect">{label}</div>; }
function TweakRow({ label, children }) { return <div className="twk-row"><div className="twk-lbl"><span>{label}</span></div>{children}</div>; }
function TweakRadio({ label, value, options, onChange }) {
  const opts = options.map(o => typeof o === 'object' ? o : { value: o, label: o });
  const idx = Math.max(0, opts.findIndex(o => o.value === value));
  const n = opts.length;
  return (<TweakRow label={label}><div className="twk-seg"><div className="twk-seg-thumb" style={{ left:`calc(2px + ${idx}*(100% - 4px)/${n})`, width:`calc((100% - 4px)/${n})` }}/>{opts.map(o => <button key={o.value} onClick={() => onChange(o.value)}>{o.label}</button>)}</div></TweakRow>);
}
function TweakSelect({ label, value, options, onChange }) {
  return (<TweakRow label={label}><select className="twk-field" value={value} onChange={e=>onChange(e.target.value)}>{options.map(o=>{ const v=typeof o==='object'?o.value:o; const l=typeof o==='object'?o.label:o; return <option key={v} value={v}>{l}</option>; })}</select></TweakRow>);
}
Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakSelect });
</script>

function NewsCard({ item, font }) {

          <div style={{ fontFamily:"Space Grotesk,sans-serif", fontSize:10, fontWeight:700, color:"rgba(255,255,255,0.85)", letterSpacing:"0.04em" }}>{video.views} views</div>
        </div>
      </div>
      <p style={{ fontFamily:"Sarabun,sans-serif", fontWeight:700, fontSize:13, lineHeight:1.4, color:"var(--txt)", margin:0, textWrap:"pretty" }}>{video.title}</p>
    </a>
  );
}

// Section header shared
function YTSectionHeader({ label, icon, title, href, hrefLabel="SEE ALL" }) {
  return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:24, flexWrap:"wrap", gap:12 }}>
      <div style={{ display:"flex", alignItems:"center", gap:10 }}>
        <div style={{ width:4, height:18, background:"#FF0000" }}></div>
        <span style={{ fontFamily:"Space Grotesk,sans-serif", fontSize:9, letterSpacing:"0.2em", color:"var(--txt-3)", textTransform:"uppercase" }}>{label}</span>
        {icon}
        <span style={{ fontFamily:"Space Grotesk,sans-serif", fontWeight:700, fontSize:12, color:"var(--txt)", letterSpacing:"0.04em" }}>{title}</span>
      </div>
      <a href={href} target="_blank" rel="noopener noreferrer"
        style={{ fontFamily:"Space Grotesk,sans-serif", fontSize:11, fontWeight:700, color:"var(--txt-3)", textDecoration:"none", letterSpacing:"0.08em", display:"flex", alignItems:"center", gap:5 }}>
        {hrefLabel}
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
    </div>
  );
}

function YouTubeSection() {
  return (
    <div style={{ background:"var(--bg)", borderTop:"1px solid var(--bdr)" }}>
      {/* ── Video Grid ── */}
      <div style={{ padding:"48px 0 36px", borderBottom:"1px solid var(--bdr)" }}>
        <div className="rsp-wrap">
          <YTSectionHeader
            label="Watch"
            icon={<IconYT />}
            title="THE STANDARD SPORT"
            href="https://www.youtube.com/@TheStandardTH"
          />
          {/* 3-col + featured layout: featured big left, 3 small right */}
          <div className="rsp-ytmn">
            {/* Featured */}
            <VideoCard video={YT_VIDEOS[0]} />
            {/* Right 3-col list */}
            <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
              {YT_VIDEOS.slice(1,4).map(v => (
                <a key={v.id} href={`https://www.youtube.com/watch?v=${v.id}`} target="_blank" rel="noopener noreferrer"
                  style={{ textDecoration:"none", display:"grid", gridTemplateColumns:"120px 1fr", gap:12, alignItems:"start" }}>
                  <div style={{ position:"relative", paddingBottom:"52.33%", background:v.bg, overflow:"hidden" }}>
                    <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center" }}><IconPlay size={28} /></div>
                    <div style={{ position:"absolute", bottom:5, right:5, background:"rgba(0,0,0,0.82)", padding:"1px 5px", fontFamily:"Space Grotesk,sans-serif", fontSize:9, fontWeight:700, color:"#fff" }}>{v.dur}</div>
                  </div>
                  <div>
                    <span style={{ display:"inline-block", padding:"1px 6px", background:"#0d0d0d", color:"#fff", fontFamily:"Space Grotesk,sans-serif", fontSize:8, fontWeight:700, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:5 }}>{v.cat}</span>
                    <p style={{ fontFamily:"Sarabun,sans-serif", fontWeight:700, fontSize:13, lineHeight:1.4, color:"var(--txt)", margin:"0 0 4px", textWrap:"pretty" }}>{v.title}</p>
                    <p style={{ fontFamily:"Space Grotesk,sans-serif", fontSize:10, color:"var(--txt-3)", margin:0 }}>{v.views}K · {v.date}</p>
                  </div>
                </a>
              ))}
            </div>
          </div>
          {/* Bottom row 3 more */}
          <div className="rsp-ytbt">
            {YT_VIDEOS.slice(3,6).map(v => <VideoCard key={v.id} video={v} />)}
          </div>
        </div>
      </div>

      {/* ── Shorts ── */}
      <div style={{ padding:"36px 0 48px" }}>
        <div className="rsp-wrap">
          <YTSectionHeader
            label="Shorts"
            icon={<span style={{ color:"#FF0000", display:"flex", alignItems:"center" }}><IconShorts /></span>}
            title="THE STANDARD SPORT SHORTS"
            href="https://www.youtube.com/@TheStandardTH/shorts"
            hrefLabel="SEE ALL SHORTS"
          />
        </div>
        {/* Horizontal scroll — bleeds to edges */}
        <div style={{ overflowX:"auto", paddingBottom:8, scrollbarWidth:"none" }}
          onMouseEnter={e=>e.currentTarget.style.cursor="grab"}
          onMouseLeave={e=>e.currentTarget.style.cursor="default"}>
          <div style={{ display:"flex", gap:16, paddingLeft:40, paddingRight:40, width:"max-content" }}>
            {YT_SHORTS.map(s => <ShortCard key={s.id} video={s} />)}
          </div>
        </div>
      </div>
    </div>
  );
}

function CategoryNav({ font }) {
  const [active, setActive] = useS2("F1");
  const ff = font==="serif"?"Noto Serif Thai,serif":"Sarabun,sans-serif";
  const cats = ["F1"];
  return (
    <div style={{ background:"var(--bg)", borderBottom:"1px solid var(--bdr)", overflowX:"auto" }}>
      <div className="rsp-wrap" style={{ display:"flex", gap:4, overflowX:"auto" }}>
        {cats.map(c=>(
          <button key={c} onClick={()=>setActive(c)} style={{ background:active===c?"#ffa5f7":"none", border:"none", cursor:"pointer", padding:"10px 18px", fontFamily:ff, fontWeight:600, fontSize:13, color:active===c?"#0d0d0d":"var(--txt-3)", whiteSpace:"nowrap", transition:"all 0.15s" }}>{c}</button>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [t, setTweak] = window.useTweaks({ heroLayout:"full", fontStyle:"sans" });
  const [dark, setDark] = useS2(() => {
    try { const s=localStorage.getItem('theme'); if(s) return s==='dark'; } catch(e){}
    return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  });

  useE2(() => {
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : '');
    try { localStorage.setItem('theme', dark ? 'dark' : 'light'); } catch(e){}
  }, [dark]);

  return (
    <div>
      <window.Navbar font={t.fontStyle} dark={dark} onToggleDark={()=>setDark(d=>!d)} />
      {t.heroLayout==="full" ? <window.HeroFull font={t.fontStyle} /> : <window.HeroGrid font={t.fontStyle} />}
      <CategoryNav font={t.fontStyle} />
      <window.F1Section font={t.fontStyle} />
      <window.FootballStandings font={t.fontStyle} />
      <window.NewsGrid font={t.fontStyle} />
      <YouTubeSection />
      <window.Footer />
      <window.TweaksPanel title="Tweaks">
        <window.TweakSection label="Hero Layout" />
        <window.TweakRadio label="Style" value={t.heroLayout} options={["full","grid"]} onChange={v=>setTweak("heroLayout",v)} />
        <window.TweakSection label="Typography" />
        <window.TweakRadio label="Font" value={t.fontStyle} options={["sans","serif"]} onChange={v=>setTweak("fontStyle",v)} />

      </window.TweaksPanel>
    </div>
  );
}

window.ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
